<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Coletor Anota AI - Diamond Delivery</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101218;
        --panel: #171a23;
        --line: rgba(255, 255, 255, 0.12);
        --text: #f7f8fb;
        --muted: #a6adbb;
        --cyan: #45f0df;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 22px;
        background:
          linear-gradient(90deg, rgba(255, 77, 109, 0.14), transparent 34%, rgba(38, 183, 255, 0.14)),
          var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(920px, 100%);
        display: grid;
        gap: 14px;
        border: 1px solid transparent;
        border-radius: 8px;
        background:
          linear-gradient(var(--panel), var(--panel)) padding-box,
          linear-gradient(120deg, #ff4d6d, #ffca3a, #31d58a, #26b7ff, var(--cyan)) border-box;
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.36);
        padding: 20px;
      }

      h1,
      p {
        margin: 0;
      }

      p {
        color: var(--muted);
        line-height: 1.5;
      }

      textarea {
        width: 100%;
        min-height: 360px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0f1219;
        color: var(--text);
        padding: 12px;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 12px;
      }

      button {
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        color: #061014;
        background: linear-gradient(90deg, #ff4d6d, #ffca3a, #31d58a, #26b7ff);
        font-weight: 900;
        cursor: pointer;
        padding: 0 16px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Coletor Anota AI</h1>
      <p>Abra o Anota AI logado, pressione F12, cole este codigo no Console e aperte Enter. Depois navegue pelas telas de mesas/produtos/cardapio e clique em Copiar JSON no painel Diamond Coletor.</p>
      <div class="actions">
        <button id="copyBtn" type="button">Copiar coletor</button>
      </div>
      <textarea id="collectorCode" spellcheck="false"></textarea>
    </main>

    <script>
      fetch("scripts/anota-ai-coletor.js")
        .then((response) => response.text())
        .then((code) => {
          document.getElementById("collectorCode").value = code;
        });

      document.getElementById("copyBtn").addEventListener("click", async () => {
        const code = document.getElementById("collectorCode").value;
        await navigator.clipboard.writeText(code);
        document.getElementById("copyBtn").textContent = "Copiado";
      });
    </script>
  </body>
</html>
